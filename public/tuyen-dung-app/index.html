<body>
  <div id="root"></div>
  <script>
    (() => {
      const normalizeText = (value = "") =>
        value
          .toString()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .trim();

      const aiKeywords = [
        "hoi ai",
        "chat voi ai",
        "ai tuyen dung",
        "ban muon hoi gi",
      ];

      const isAiText = (text) => {
        const normalized = normalizeText(text);
        return aiKeywords.some((keyword) => normalized.includes(keyword));
      };

      const removeAskAiElements = () => {
        // Hide chat panel/floating button by class signature from the recruitment app.
        document.querySelectorAll("[class*='shadow-chat']").forEach((el) => {
          el.remove();
        });

        // Remove CTA/button text related to AI chat.
        document
          .querySelectorAll("button, a, [role='button'], h1, h2, h3, h4, p, span, div")
          .forEach((el) => {
            const text = (el.textContent || "").trim();
            if (!text || !isAiText(text)) return;

            const chatPanel = el.closest("[class*='shadow-chat']");
            if (chatPanel) {
              chatPanel.remove();
              return;
            }

            if (el.matches("button, a, [role='button']")) {
              el.remove();
            }
          });
      };

      const run = () => {
        removeAskAiElements();
        const observer = new MutationObserver(removeAskAiElements);
        observer.observe(document.body, {
          childList: true,
          subtree: true,
        });
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", run, { once: true });
      } else {
        run();
      }
    })();
  </script>
</body>

</html>
