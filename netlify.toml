# netlify.toml — đặt ở thư mục gốc dự án

[build]
  # Đổi lệnh theo package manager bạn dùng:
  # npm:    "npm run build"
  # yarn:   "yarn build"
  # pnpm:   "pnpm build"
  command = "npm run build"

  # Thư mục output do Next.js tạo, để plugin xử lý deploy
  publish = ".next"

  # (tuỳ chọn) Nơi đặt Netlify Functions nếu bạn có functions tự viết
  functions = "netlify/functions"

[build.environment]
  # Buộc Netlify dùng Node 18 cho build
  NODE_VERSION = "18"
  # (khuyến nghị) bỏ devDependencies khi cài trong CI để build nhẹ hơn
  NPM_FLAGS = "--omit=dev"


# ====== Tuỳ CHỌN nếu muốn tắt tối ưu ảnh runtime (giảm rủi ro lỗi _ipx) ======
# Bật 1 trong 2 cách sau (khuyên dùng thêm biến môi trường NEXT_DISABLE_IPX=1 trong Netlify UI)
# [template.environment]
#   NEXT_DISABLE_IPX = "1"
