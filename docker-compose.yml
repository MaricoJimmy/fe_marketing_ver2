version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - WORDPRESS_GRAPHQL_ENDPOINT=${WORDPRESS_GRAPHQL_ENDPOINT:-https://pambu-cms.org/graphql}
    container_name: nextjs-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - WORDPRESS_GRAPHQL_ENDPOINT=${WORDPRESS_GRAPHQL_ENDPOINT:-https://pambu-cms.org/graphql}
    env_file:
      - .env.local
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
